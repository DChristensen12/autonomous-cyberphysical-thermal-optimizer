; ACPTO — PlatformIO config

[platformio]
default_envs = teensy40

[env:teensy40]
platform  = teensy
board     = teensy40
framework = arduino

monitor_speed   = 115200
monitor_filters = direct

; -O2 not -O3 — I want the asm output readable when I diff it against the
; hand-rolled version. ffast-math is fine here; the GP math doesn't care
; about strict IEEE ordering.
build_flags =
    -O2
    -ffast-math
    -fno-exceptions
    -fno-rtti
    -Wall
    -Wextra
    -Wno-unused-parameter
    -DACPTO_VERSION=\"0.1.0\"

extra_scripts = pre:tools/gen_listing.py

lib_deps =
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0

; Laptop-side test env. Runs the Matrix2D and GP tests under desktop g++
; so I don't have to reflash for every math tweak.
[env:native_test]
platform = native
test_framework = unity
build_flags =
    -std=c++17
    -O0
    -g
    -Wall
    -Wextra
    -DACPTO_NATIVE_TEST
