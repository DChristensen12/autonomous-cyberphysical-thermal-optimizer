; PlatformIO project config. Building any environment here makes PlatformIO go
; fetch everything it needs on its own: the Teensy platform, the compiler
; toolchain, and the Arduino framework. There is no separate setup step, the
; first build does all the downloading for you.

[env]
platform = teensy
board = teensy40
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+

; The real firmware. Builds everything in src/ except the bring-up file, so
; the two setup/loop pairs never collide.
[env:teensy40]
build_flags = -O2 -ffast-math -I include
build_src_filter = +<*> -<hardware_check.cpp>

; The hardware bring-up tester. Builds only hardware_check.cpp and leaves the
; real Main.cpp out. Flash this first to check your wiring before trusting the
; optimizer with the hardware.
[env:hardware_check]
build_flags = -O2 -I include
build_src_filter = +<hardware_check.cpp> -<Main.cpp>